<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NightShadeOS - Sanctum</title>

<link rel="stylesheet" href="css/core.css">

</head>


<body>


<div id="sanctum">


    <div id="desktop-icons">


        <div class="desktop-icon">
            🌐
            <span>Nebula</span>
        </div>


        <div class="desktop-icon">
            📁
            <span>Codex</span>
        </div>


        <div class="desktop-icon">
            ✍️
            <span>Ink</span>
        </div>


        <div class="desktop-icon">
            📊
            <span>Grid</span>
        </div>


        <div class="desktop-icon">
            🎞️
            <span>Prism</span>
        </div>


        <div class="desktop-icon">
            ⚙️
            <span>Control Center</span>
        </div>


    </div>



    <div id="taskbar">


        <button id="launcher-button">
            🌕
        </button>


        <div id="clock">
            00:00
        </div>


    </div>


</div>



<script src="js/sanctum.js"></script>


</body>

</html>
