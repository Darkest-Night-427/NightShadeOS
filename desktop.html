<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NightShadeOS - Sanctum</title>

<link rel="stylesheet" href="css/core.css">

</head>


<body>


<div id="sanctum">


  <div id="desktop-icons">

    <div class="desktop-icon" id="codex-icon">
        <div class="icon">📁</div>
        <span>Codex</span>
    </div>

    <div class="desktop-icon" id="nebula-icon">
        <div class="icon">🌐</div>
        <span>Nebula</span>
    </div>

    <div class="desktop-icon" id="ink-icon">
        <div class="icon">✍️</div>
        <span>Ink</span>
    </div>

    <div class="desktop-icon" id="grid-icon">
        <div class="icon">📊</div>
        <span>Grid</span>
    </div>

    <div class="desktop-icon" id="prism-icon">
        <div class="icon">🎞️</div>
        <span>Prism</span>
    </div>

    <div class="desktop-icon" id="control-icon">
        <div class="icon">⚙️</div>
        <span>Control Center</span>
    </div>

</div>



    <div id="taskbar">

<div id="lunar-launcher">

    <div class="launcher-title">
        🌕 Lunar Launcher
    </div>


    <div class="launcher-item">
        📁 Codex
    </div>


    <div class="launcher-item">
        🌐 Nebula
    </div>


    <div class="launcher-item">
        ✍ Ink
    </div>


    <div class="launcher-item">
        📊 Grid
    </div>


    <div class="launcher-item">
        🎞 Prism
    </div>


    <div class="launcher-item">
        ⚙ Control Center
    </div>


</div>
        <button id="launcher-button">
            🌕
        </button>


        <div id="clock">
            00:00
        </div>


    </div>


</div>



<script src="js/sanctum.js"></script>
<script src="js/lunar.js"></script>


</body>

</html>
